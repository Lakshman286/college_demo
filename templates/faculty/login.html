<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-wrapper" style="background:linear-gradient(135deg,#065f46 0%,#059669 100%);">
    <div class="login-card">
        <div class="login-logo">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo" onerror="this.style.display='none'">
            
        </div>
        <div class="login-title" style="color:#065f46;">Faculty Portal</div>
        <div class="login-subtitle">Sign in with your faculty credentials</div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Enter faculty username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-success btn-block" style="margin-top:8px;">Sign In as Faculty</button>
        </form>
        <div style="text-align:center;margin-top:20px;font-size:13px;color:#64748b;">
            <a href="{{ url_for('student.login') }}" style="color:#059669;text-decoration:none;">Student Login</a>
        </div>
    </div>
</div>
</body>
</html>
